<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Background circular radial glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0B2036" />
      <stop offset="100%" stop-color="#0B0F19" />
    </radialGradient>
    
    <!-- Neon gradients -->
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>
    
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00A3FF" />
    </linearGradient>
    
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CE93D8" />
      <stop offset="100%" stop-color="#8E24AA" />
    </linearGradient>
    
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>

    <!-- Glow filter for neon effect -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background base with border -->
  <rect width="32" height="32" rx="6" fill="url(#bgGlow)" />
  <rect width="32" height="32" rx="6" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />

  <!-- Gravitational orbit paths forming the letter G -->
  <path d="M 9,20 C 6,15 9,9 16,9 C 22,9 25,13 25,17 C 25,22 20,25 15,25 C 12,25 12,23 15,23 C 18,23 22,21 22,17 C 22,14 20,12 16,12 C 12,12 10,15 12,19" 
        fill="none" stroke="url(#mintGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.85" filter="url(#glow)" />
        
  <!-- Tenue spring connections -->
  <line x1="16" y1="16" x2="23" y2="10" stroke="rgba(240, 244, 255, 0.25)" stroke-width="0.75" stroke-dasharray="1.5,1.5" />
  <line x1="16" y1="16" x2="10" y2="23" stroke="rgba(240, 244, 255, 0.25)" stroke-width="0.75" stroke-dasharray="1.5,1.5" />

  <!-- Floating nodes -->
  <!-- 1. Central Core Idea (Mint) -->
  <circle cx="16" cy="16" r="3.2" fill="url(#mintGrad)" filter="url(#glow)" />

  <!-- 2. Satellite Node 1 (Reference - Violet) -->
  <circle cx="23" cy="10" r="2.2" fill="url(#violetGrad)" filter="url(#glow)" />

  <!-- 3. Satellite Node 2 (Task - Amber) -->
  <circle cx="10" cy="23" r="2.2" fill="url(#amberGrad)" filter="url(#glow)" />

  <!-- 4. Subtle gravitational wave rings -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="rgba(0, 255, 135, 0.12)" stroke-width="0.5" />
</svg>
